<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Threadframe — @iwjong</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/player.css" />
</head>
<body>
  <div class="frame-container">
    <div class="frame-layout">
      <!-- Left: square media -->
      <section class="panel-media" aria-label="Media">
        <div class="media-stage">
          <div class="media-3d-layer" aria-hidden="true"></div>
          <div class="media-wrap">
            <!-- Filled by player.js -->
          </div>
          <div class="media-progress" aria-hidden="true">
            <div class="media-time-row">
              <span class="media-time-current">0:00</span>
              <span class="media-time-total">0:00</span>
            </div>
            <div class="media-progress-bar"><div class="media-progress-fill"></div></div>
          </div>
        </div>
        <div class="media-preload" aria-hidden="true"></div>
      </section>
      <!-- Right: flexible typography -->
      <section class="panel-typography" aria-label="Caption">
        <header class="panel-header">
          <p class="post-meta" id="post-meta" aria-label="Post date and likes"></p>
          <div class="panel-header-actions" aria-label="Playback controls">
            <button type="button" class="random-toggle" aria-label="Random play" title="Random">
              <svg class="icon-shuffle-on" viewBox="0 0 68.73 68.75" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path fill="currentColor" d="M41.23,0h27.5v27.5h-4.58V7.82L3.24,68.73l-3.24-3.24L60.91,4.58h-19.68V0ZM41.23,64.17h19.68l-21.02-21.02,3.24-3.24,21.02,21.02v-19.68h4.58v27.5h-27.5v-4.58ZM0,3.26L3.24.02l25.58,25.58-3.24,3.24L0,3.26Z"/></svg>
              <svg class="icon-shuffle-off" viewBox="0 0 77.92 78.24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path fill="currentColor" d="M77.92,16.2l-16.2,16.2-3.24-3.24,10.67-10.67H13.75v18.33h-4.58V13.91h59.98l-10.67-10.67,3.24-3.24,16.2,16.2ZM64.17,59.75v-18.33h4.58v22.92H8.77l10.67,10.67-3.24,3.24L0,62.04l16.2-16.2,3.24,3.24-10.67,10.67h55.39Z"/></svg>
            </button>
            <button type="button" class="sound-toggle muted" aria-label="Unmute video" title="Unmute">
              <svg class="icon-sound-on" viewBox="0 0 87.08 68.75" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path fill="currentColor" d="M87.08,34.38c0,18.21-14.17,33.12-32.08,34.3v-4.59c15.38-1.17,27.5-14.02,27.5-29.71s-12.12-28.53-27.5-29.7V.08c17.92,1.18,32.08,16.09,32.08,34.3ZM73.33,34.38c0,10.62-8.02,19.36-18.33,20.5v-4.62c7.77-1.11,13.75-7.8,13.75-15.88s-5.98-14.77-13.75-15.88v-4.62c10.31,1.14,18.33,9.88,18.33,20.5ZM59.58,34.38c0,2.99-1.91,5.54-4.58,6.48v-12.97c2.67.94,4.58,3.49,4.58,6.48ZM0,18.33h18.33L36.67,0h9.17v68.75h-9.17l-18.33-18.33H0V18.33ZM4.58,45.83h15.65l18.33,18.33h2.68V4.58h-2.68l-18.33,18.33H4.58v22.92Z"/></svg>
              <svg class="icon-sound-off" viewBox="0 0 87.25 68.75" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path fill="currentColor" d="M0,18.33h18.33L36.67,0h9.17v68.75h-9.17l-18.33-18.33H0V18.33ZM4.58,45.83h15.65l18.33,18.33h2.68V4.58h-2.68l-18.33,18.33H4.58v22.92ZM54.84,47.34l12.96-12.96-12.96-12.96,3.24-3.24,12.96,12.96,12.96-12.96,3.24,3.24-12.96,12.96,12.96,12.96-3.24,3.24-12.96-12.96-12.96,12.96-3.24-3.24Z"/></svg>
            </button>
          </div>
        </header>
        <main class="panel-body">
          <div class="caption-wrap" aria-live="polite">
            <div class="text"></div>
          </div>
        </main>
        <footer class="panel-footer">
          <button type="button" class="nav-arrow prev" aria-label="Previous">
            <svg class="icon-arrow" viewBox="0 0 22.69 38.89" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><polygon fill="currentColor" points="19.45 0 0 19.45 19.45 38.89 22.69 35.65 6.48 19.45 22.69 3.24 19.45 0"/></svg>
          </button>
          <span class="counter">0/0</span>
          <button type="button" class="nav-arrow next" aria-label="Next">
            <svg class="icon-arrow" viewBox="0 0 22.69 38.89" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><polygon fill="currentColor" points="3.24 0 0 3.24 16.2 19.45 0 35.65 3.24 38.89 22.69 19.45 3.24 0"/></svg>
          </button>
        </footer>
      </section>
    </div>

    <div class="loading" style="display: none;" aria-live="polite">
      <div class="loading-card">
        <h1 class="loading-title">Threadframe</h1>
        <p class="loading-thread-id"><span id="loading-thread-id">@iwjong</span></p>
        <p class="loading-status" id="loading-status">Connecting to Threads…</p>
        <div class="loading-progress" aria-hidden="true">
          <div class="loading-progress-track">
            <div class="loading-progress-fill" id="loading-progress-fill"></div>
          </div>
          <div class="loading-progress-meta">
            <span class="loading-progress-value" id="loading-progress-value">0%</span>
          </div>
        </div>
      </div>
    </div>
    <div class="splash" style="display: none;" aria-live="polite" aria-label="Loading">
      <div class="splash-slide splash-slide-active" data-slide="0">
        <p class="splash-title">Threadframe</p>
        <p class="splash-version">v0.1.0</p>
        <p class="splash-desc">Ready</p>
      </div>
    </div>
    <div class="reconnect" style="display: none;" aria-live="polite" aria-label="Connection issue">
      <div class="reconnect-card">
        <div class="reconnect-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 8v4M12 16h.01"/>
          </svg>
        </div>
        <h2 class="reconnect-title">Connection issue</h2>
        <p class="reconnect-message" id="reconnect-message"></p>
        <div class="reconnect-actions">
          <a href="/auth" class="reconnect-btn reconnect-btn-primary">Get token (OAuth)</a>
          <a href="/" class="reconnect-btn reconnect-btn-secondary">Retry</a>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/player.js"></script>
</body>
</html>
